<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout('库存管理', '采购入库与库存明细', 'stock', ~{::content})">
<body>
<th:block th:fragment="content">
    <section class="toolbar panel flat">
        <form class="search-form wide-search auto-filter" th:action="@{/stock}">
            <label>商品
                <select name="goodsId" data-auto-submit>
                    <option value="">全部商品</option>
                    <option th:each="g : ${filterGoodsList}"
                            th:value="${g.id}"
                            th:selected="${goodsId == g.id}"
                            th:text="${g.name + '-' + (g.type == null ? '' : g.type) + '-' + (g.model == null ? '' : g.model) + '【' + (g.stock == null ? 0 : g.stock) + '】'}">商品</option>
                </select>
            </label>
            <label>库存范围
                <select name="stockScope" data-auto-submit>
                    <option value="valid" th:selected="${stockScope == 'valid'}">有效库存</option>
                    <option value="all" th:selected="${stockScope == 'all'}">全部库存</option>
                </select>
            </label>
            <button class="btn" type="submit">查询</button>
        </form>
        <button class="btn primary" type="button" data-modal-open="stockModal">添加库存</button>
    </section>

    <section class="panel">
        <div class="table-wrap">
            <table>
                <thead><tr><th>商品</th><th>箱数</th><th>盒数</th><th>进货单价</th><th>库存</th><th>总金额</th><th>库存金额</th><th>时间</th><th>操作</th></tr></thead>
                <tbody>
                <tr th:each="s : ${pageData.records}">
                    <td><strong th:text="${s.goodsName}">商品</strong></td>
                    <td th:text="${s.ctns}">0</td>
                    <td th:text="${s.number}">0</td>
                    <td th:text="${@money.format(s.unitPrice)}">￥0.00</td>
                    <td><span class="stock-badge" th:text="${s.stock}">0</span></td>
                    <td th:text="${@money.format(s.totalAmount)}">￥0.00</td>
                    <td th:text="${@money.format(s.stockTotalAmount)}">￥0.00</td>
                    <td th:text="${#temporals.format(s.createdTime, 'yyyy-MM-dd HH:mm')}">时间</td>
                    <td class="actions">
                        <button class="btn small" type="button" data-modal-open="stockModal"
                                th:attr="data-id=${s.id},data-goodsid=${s.goodsId},data-ctns=${s.ctns},data-number=${s.number},data-unitprice=${s.unitPrice},data-cost=${s.cost},data-sellingprice=${s.sellingPrice},data-stock=${s.stock}">编辑</button>
                        <form method="post" th:action="@{/stock/delete}" onsubmit="return confirm('确认删除该库存记录？')">
                            <input type="hidden" name="id" th:value="${s.id}">
                            <button class="btn danger small" type="submit">删除</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(pageData.records)}"><td colspan="9" class="empty">暂无库存记录</td></tr>
                </tbody>
            </table>
        </div>
        <div class="pager"><span th:text="${'共 ' + pageData.total + ' 条，第 ' + pageData.page + ' / ' + pageData.totalPages + ' 页'}">共 0 条</span><div><a class="btn small" th:classappend="${!pageData.hasPrevious} ? ' disabled'" th:href="@{/stock(goodsId=${goodsId},stockScope=${stockScope},page=${pageData.previousPage},size=${pageData.size})}">上一页</a><a class="btn small" th:classappend="${!pageData.hasNext} ? ' disabled'" th:href="@{/stock(goodsId=${goodsId},stockScope=${stockScope},page=${pageData.nextPage},size=${pageData.size})}">下一页</a></div></div>
    </section>

    <div class="modal" id="stockModal" aria-hidden="true">
        <div class="modal-mask" data-modal-close></div>
        <section class="modal-panel">
            <div class="modal-head"><h2>新增库存</h2><button class="icon-btn" type="button" data-modal-close>×</button></div>
            <form class="grid-form" method="post" th:action="@{/stock/save}" th:object="${stock}">
                <input type="hidden" th:field="*{id}" data-field="id">
                <label>商品<select th:field="*{goodsId}" data-field="goodsid" required><option value="">请选择商品</option><option th:each="g : ${goodsList}" th:value="${g.id}" th:text="${g.name + '-' + (g.type == null ? '' : g.type) + '-' + (g.model == null ? '' : g.model) + '【' + (g.stock == null ? 0 : g.stock) + '】'}">商品</option></select></label>
                <label>箱数<input type="number" step="0.01" th:field="*{ctns}" data-field="ctns"></label>
                <label>盒数<input type="number" th:field="*{number}" data-field="number" min="0" required></label>
                <label>当前库存<input type="number" th:field="*{stock}" data-field="stock" min="0" placeholder="默认等于盒数"></label>
                <label>进货单价<input type="number" step="0.01" th:field="*{unitPrice}" data-field="unitprice" min="0" required></label>
                <label>发出成本<input type="number" step="0.01" th:field="*{cost}" data-field="cost" min="0"></label>
                <label>销售价格<input type="number" step="0.01" th:field="*{sellingPrice}" data-field="sellingprice" min="0"></label>
                <div class="form-actions wide"><button class="btn" type="button" data-modal-close>取消</button><button class="btn primary" type="submit">保存库存</button></div>
            </form>
        </section>
    </div>
</th:block>
</body>
</html>
