<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout('资产快照明细', '查看月度资产历史版本', 'assets', ~{::content})">
<body>
<th:block th:fragment="content">
    <section class="toolbar panel flat asset-filter-panel" data-mobile-collapse>
        <button class="asset-filter-toggle" type="button" data-mobile-collapse-toggle aria-expanded="false">
            <span>
                <b>筛选条件</b>
                <small th:text="${#temporals.format(month.atDay(1), 'yyyy年 M月') + ' · 点击展开'}">2026年 5月 · 点击展开</small>
            </span>
            <i aria-hidden="true"></i>
        </button>
        <div class="asset-filter-body" data-mobile-collapse-body>
            <form class="search-form" th:action="@{/assets/snapshots}">
                <label>统计月份
                    <button class="date-range-trigger month-trigger" type="button" data-month-picker>
                        <span data-month-label th:text="${#temporals.format(month.atDay(1), 'yyyy年 M月')}">2026年 5月</span>
                    </button>
                </label>
                <input type="hidden" name="month" th:value="${month}" data-month-value>
                <input type="hidden" name="compareMonth" th:value="${compareMonth}">
                <button class="btn" type="submit">筛选</button>
            </form>
            <div class="toolbar-actions">
                <a class="btn" th:href="@{/assets(month=${month}, compareMonth=${compareMonth})}">返回资产</a>
            </div>
        </div>
    </section>

    <section class="panel">
        <div class="panel-head">
            <div>
                <h2 th:text="${#temporals.format(month.atDay(1), 'yyyy年 M月')} + ' 当前资产'">当前资产</h2>
                <p class="eyebrow">当前主表中保留的最新版本</p>
            </div>
        </div>
        <div class="asset-summary-grid">
            <div><span>现金存款</span><b class="cash-amount-green" th:text="${@money.format(currentAsset.cashDeposit)}">￥0.00</b></div>
            <div><span>实际存款</span><b th:text="${@money.format(currentAsset.actualDeposit)}">￥0.00</b></div>
            <div><span>进货金额</span><b th:text="${@money.format(currentAsset.purchaseAmount)}">￥0.00</b></div>
            <div><span>待确认货款</span><b th:text="${@money.format(currentAsset.receivableTotal)}">￥0.00</b></div>
            <div><span>本月存款</span><b class="cash-amount-green" th:text="${@money.format(currentAsset.monthDeposit)}">￥0.00</b></div>
            <div><span>预估存款</span><b th:text="${@money.format(currentAsset.estimatedDeposit)}">￥0.00</b></div>
            <div><span>今年利润</span><b th:text="${@money.format(currentAsset.yearlyProfit)}">￥0.00</b></div>
            <div><span>去年存款</span><b th:text="${@money.format(currentAsset.lastYearDeposit)}">￥0.00</b></div>
        </div>
    </section>

    <section class="panel">
        <div class="panel-head">
            <div>
                <h2>历史快照</h2>
                <p class="eyebrow">点击资产录入弹窗中的“保存快照”后，会在这里保留当时的数据</p>
            </div>
        </div>
        <div class="table-wrap">
            <table class="responsive-table data-table table-asset-snapshots">
                <thead>
                <tr>
                    <th>快照时间</th>
                    <th>现金存款</th>
                    <th>本月存款</th>
                    <th>进货金额</th>
                    <th>待确认货款</th>
                    <th>实际存款</th>
                    <th>预估存款</th>
                    <th>今年利润</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${snapshots}">
                    <td class="table-primary" data-label="快照时间" th:text="${s.snapshotTime == null ? '-' : #temporals.format(s.snapshotTime, 'yyyy-MM-dd HH:mm')}">-</td>
                    <td class="cash-amount-green" data-label="现金存款" th:text="${@money.format(s.cashDeposit)}">￥0.00</td>
                    <td class="cash-amount-green" data-label="本月存款" th:text="${@money.format(s.monthDeposit)}">￥0.00</td>
                    <td data-label="进货金额" th:text="${@money.format(s.purchaseAmount)}">￥0.00</td>
                    <td data-label="待确认货款" th:text="${@money.format(s.receivableTotal)}">￥0.00</td>
                    <td data-label="实际存款" th:text="${@money.format(s.actualDeposit)}">￥0.00</td>
                    <td data-label="预估存款" th:text="${@money.format(s.estimatedDeposit)}">￥0.00</td>
                    <td data-label="今年利润" th:text="${@money.format(s.yearlyProfit)}">￥0.00</td>
                    <td class="table-actions" data-label="操作">
                        <form method="post" th:action="@{/assets/snapshot/delete}" onsubmit="return confirm('确认删除该历史快照？')">
                            <input type="hidden" name="id" th:value="${s.id}">
                            <input type="hidden" name="month" th:value="${month}">
                            <input type="hidden" name="compareMonth" th:value="${compareMonth}">
                            <button class="btn danger small" type="submit">删除</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(snapshots)}">
                    <td colspan="9" class="empty">暂无历史快照。点击资产录入弹窗中的“保存快照”后，会在这里看到快照数据。</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <div class="date-popover month-popover" data-month-popover>
        <div class="month-head"><button type="button" data-month-prev>‹</button><b data-month-title>2026年</b><button type="button" data-month-next>›</button></div>
        <div class="month-grid" data-month-grid></div>
        <div class="quick-actions"><button type="button" data-month-now>本月</button><button class="primary-link" type="button" data-month-apply>确定</button></div>
    </div>
</th:block>
</body>
</html>
