<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存系统</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/assets/css/app.css(v=${#dates.createNow().time})}">
</head>
<body class="login-page">
<main class="login-shell">
    <form class="login-form" method="post" autocomplete="on" th:action="@{/login}" data-login-form>
        <div class="login-brand">
            <span class="brand-mark" aria-hidden="true"><svg class="ui-icon"><use href="/assets/icons.svg#package"></use></svg></span>
            <div><strong>ShopStock</strong><small>电商库存经营系统</small></div>
        </div>
        <div class="login-heading"><h1>欢迎回来</h1><p>登录你的经营工作台</p></div>
        <div class="alert" role="alert" th:if="${error}" th:text="${error}">账号或密码错误</div>
        <label>
            账号
            <input type="text" name="username" value="admin" required autocomplete="username" data-login-username>
        </label>
        <label>
            密码
            <input type="password" name="password" required autocomplete="current-password" data-login-password>
        </label>
        <label class="remember-row">
            <input class="remember-checkbox" type="checkbox" name="rememberPassword" data-login-remember>
            <span>记住账号</span>
        </label>
        <button class="btn primary full" type="submit">登录系统</button>
    </form>
    <p class="login-footer">ShopStock · 库存经营管理</p>
</main>
<script th:src="@{/assets/js/app.js(v=${#dates.createNow().time})}"></script>
</body>
</html>
