<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存系统</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/assets/css/app.css(v=${#dates.createNow().time})}">
</head>
<body class="login-page">
<section class="login-panel">
    <div class="login-art">
        <div class="brand large">
            <span class="brand-mark">N</span>
            <div>
                <strong>ShopStock</strong>
                <small>电商库存经营系统</small>
            </div>
        </div>
        <h1>电商库存管理后台</h1>
        <p>管理商品档案、库存批次、销售流水和额外成本，实时掌握库存金额与经营利润。</p>
        <div class="login-metrics">
            <span><b>库存</b><em>批次库存与金额统计</em></span>
            <span><b>销售</b><em>订单利润自动核算</em></span>
            <span><b>成本</b><em>仓库支出月度归集</em></span>
        </div>
    </div>
    <form class="login-form" method="post" autocomplete="off" th:action="@{/login}" data-login-form>
        <div class="login-mobile-brand">
            <span class="brand-mark">N</span>
            <div><strong>ShopStock</strong><small>电商库存经营系统</small></div>
        </div>
        <span class="login-kicker">欢迎回来</span>
        <h2>账号登录</h2>
        <p>账号密码由管理员统一分配</p>
        <div class="alert" th:if="${error}" th:text="${error}">账号或密码错误</div>
        <label>
            账号
            <input type="text" name="username" value="admin" required autocomplete="off" data-login-username>
        </label>
        <label>
            密码
            <input type="text" value="" required autocomplete="off" data-login-password>
            <input type="hidden" name="password" data-login-password-real>
        </label>
        <label class="remember-row">
            <input class="remember-checkbox" type="checkbox" name="rememberPassword" data-login-remember>
            <span>记住密码</span>
        </label>
        <button class="btn primary full" type="submit">登录系统</button>
    </form>
</section>
<script th:src="@{/assets/js/app.js(v=${#dates.createNow().time})}"></script>
</body>
</html>
